name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JupyterLite dependencies
        run: pip install -r jupyterlite/requirements.txt

      - name: Build JupyterLite
        run: |
          cd jupyterlite
          jupyter lite build --contents content --output-dir ../static/jupyterlite --base-url /knowledge-hub/jupyterlite/
          cd ..
          sed -i "s|\./|/knowledge-hub/jupyterlite/|g" static/jupyterlite/index.html

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Build Docusaurus
        run: yarn docusaurus build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4